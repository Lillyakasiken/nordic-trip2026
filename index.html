<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1f3a5f" />
<title>Nordic Mythology Roadtrip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-900:#1b2a44;     /* dark nordic */
    --blue-700:#2c476e;
    --blue-500:#5a7da3;     /* morandi blue */
    --blue-400:#8aa6c4;
    --blue-200:#c7d4e2;
    --blue-100:#e3ebf3;
    --cream:#f4ecdb;
    --cream-2:#ece2cb;
    --paper:#f8f3e6;
    --ink:#1b2a44;
    --ink-soft:#3a4a64;
    --red:#b13a3a;          /* now-line: muted nordic red */
    --shadow: 0 1px 0 rgba(27,42,68,.06), 0 8px 24px rgba(27,42,68,.08);
    --shadow-strong: 0 12px 40px rgba(27,42,68,.18);
    --serif:'Fraunces', Georgia, serif;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; height:100%; width:100%; overflow:hidden; overscroll-behavior:none; position:fixed; inset:0;}
  body{
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    /* subtle noise + radial gradient for Nordic atmosphere */
    background-image:
      radial-gradient(1200px 600px at 10% -10%, rgba(199,212,226,.55), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, rgba(244,236,219,.85), transparent 60%),
      linear-gradient(180deg, #f6efde 0%, #efe7d2 100%);
    font-feature-settings: "ss01","liga";
    -webkit-font-smoothing: antialiased;
  }

  #app{
    position:absolute;
    inset:0;
    width:100%;
    max-width:520px;
    margin:0 auto;
    display:flex; flex-direction:column;
    min-height:0;
    background: linear-gradient(180deg, #f8f3e6 0%, #f0e8d2 100%);
    box-shadow: 0 0 60px rgba(27,42,68,.08);
    overflow:hidden;
  }

  /* ============ HOME (day picker) ============ */
  .home{
    flex:1; display:flex; flex-direction:column;
    min-height:0;
    padding: max(env(safe-area-inset-top), 18px) 18px 16px;
  }
  .home-head{
    padding: 14px 4px 18px;
    border-bottom: 1px solid rgba(27,42,68,.08);
    margin-bottom: 14px;
  }
  .kicker{
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--blue-500);
    margin-bottom: 8px;
  }
  .home-title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 30px; line-height: 1.05;
    color: var(--blue-900);
    letter-spacing: -.01em;
    margin: 0 0 4px;
  }
  .home-title em{ font-style: italic; font-weight: 300; color: var(--blue-700);}
  .home-sub{
    font-size: 12.5px; color: var(--ink-soft);
    margin-top: 6px; line-height:1.5;
  }
  .home-sub span{ color: var(--blue-700); font-weight:500;}

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    overflow-y:auto;
    padding-bottom: max(env(safe-area-inset-bottom), 16px);
    flex:1;
    scrollbar-width: none;
  }
  .grid::-webkit-scrollbar{display:none;}

  .day-card{
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(90,125,163,.18);
    border-radius: 14px;
    padding: 14px 12px 12px;
    text-align: left;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .2s ease, background .2s;
    position: relative;
    min-height: 96px;
    display:flex; flex-direction:column; justify-content:space-between;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .day-card:active{ transform: scale(.98); }
  .day-card.today{
    background: var(--blue-900);
    border-color: var(--blue-900);
    color: var(--cream);
    box-shadow: var(--shadow-strong);
  }
  .day-card.today .dnum,
  .day-card.today .dlabel,
  .day-card.today .ddate{ color: var(--cream);}
  .day-card.today .dlabel{ color: var(--blue-200);}
  .day-card.today::after{
    content:"今天 · today";
    position:absolute; top:10px; right:10px;
    font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
    background: var(--cream); color: var(--blue-900);
    padding: 3px 7px; border-radius: 99px; font-weight:600;
  }
  .day-card.demo{
    background: linear-gradient(135deg, rgba(177,58,58,.08), rgba(177,58,58,.03));
    border: 1.5px dashed rgba(177,58,58,.55);
  }
  .day-card.demo .dnum{ color:#b13a3a;}
  .day-card.demo::after{
    content:"测试 · test";
    position:absolute; top:10px; right:10px;
    font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
    background:#b13a3a; color:var(--cream);
    padding: 3px 7px; border-radius: 99px; font-weight:600;
  }
  .dnum{
    font-family: var(--serif);
    font-size: 28px; font-weight: 400;
    color: var(--blue-900);
    letter-spacing:-.02em;
    line-height:1;
  }
  .ddate{
    font-family: var(--sans);
    font-size: 11px; color: var(--blue-500);
    letter-spacing:.05em;
    margin-top: 4px;
  }
  .dlabel{
    font-size: 11.5px; color: var(--ink-soft);
    line-height: 1.35;
    margin-top: 8px;
    font-weight:400;
    /* clamp to 2 lines */
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  /* ============ DAY VIEW ============ */
  .day-view{
    flex:1;
    display:flex; flex-direction:column;
    position:relative;
    min-height:0;
    height:100%;
  }

  /* HEADER ~1/5 */
  .day-header{
    padding: max(env(safe-area-inset-top), 14px) 18px 12px;
    background: linear-gradient(180deg, var(--blue-900) 0%, var(--blue-700) 100%);
    color: var(--cream);
    position:relative;
    flex: 0 0 auto;
    box-shadow: 0 4px 20px rgba(27,42,68,.18);
    z-index:5;
  }
  .back-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 6px;
  }
  .back-btn{
    background:none; border:none; color: var(--cream);
    font-family: var(--sans); font-size: 13px;
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 0; cursor:pointer;
    opacity:.85;
  }
  .back-btn:active{opacity:.6;}
  .day-pill{
    font-size: 10.5px; letter-spacing:.18em; text-transform: uppercase;
    color: var(--blue-200); font-weight:500;
  }
  .day-title{
    font-family: var(--serif);
    font-size: 19px; font-weight: 400;
    margin: 2px 0 10px;
    line-height: 1.15;
    color: var(--cream);
    letter-spacing:-.005em;
  }
  .day-title em{ font-style: italic; color: var(--blue-200); font-weight:300;}

  .tabs{
    display:flex; gap: 6px;
  }
  .tab{
    flex:1;
    background: rgba(244,236,219,.1);
    border: 1px solid rgba(244,236,219,.18);
    color: var(--cream);
    padding: 9px 6px;
    font-family: var(--sans);
    font-size: 11.5px; font-weight: 500;
    letter-spacing: .04em;
    border-radius: 10px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition: background .15s;
  }
  .tab svg{ width:13px; height:13px; opacity:.85;}
  .tab:active{ background: rgba(244,236,219,.22);}

  /* MAIN timeline area */
  .day-main{
    flex:1 1 auto;
    min-width:0;
    min-height:0;
    overflow-x: hidden;
    overflow-y:auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 16px 0 24px;
    position:relative;
    scrollbar-width: none;
  }
  .day-main::-webkit-scrollbar{display:none;}

  /* Timeline */
  .timeline{
    position:relative;
    padding: 4px 18px 8px 18px;
    min-width:0;
  }
  .tl-spine{
    position:absolute;
    left: 64px;
    top: 8px; bottom: 8px;
    width: 1.5px;
    background: linear-gradient(180deg, transparent 0%, rgba(90,125,163,.35) 8%, rgba(90,125,163,.35) 92%, transparent 100%);
  }
  .now-line{
    position:absolute;
    left: 18px; right: 18px;
    height: 0;
    border-top: 1.5px dashed var(--red);
    z-index: 4;
    pointer-events:none;
    transition: top .3s ease;
  }
  .now-line::before{
    content:"";
    position:absolute;
    left: 46px; top: -5px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 0 4px rgba(177,58,58,.18);
  }
  .now-line::after{
    content: attr(data-label);
    position:absolute;
    right: 0; top: -18px;
    font-size: 9.5px; letter-spacing:.16em; text-transform: uppercase;
    color: var(--red); font-weight:600;
    background: var(--paper);
    padding: 2px 6px; border-radius: 4px;
  }

  .tl-item{
    position:relative;
    display:grid;
    grid-template-columns: 48px minmax(0, 1fr);
    gap: 16px;
    padding: 8px 0 14px;
    align-items: flex-start;
  }
  .tl-time{
    font-family: var(--serif);
    font-size: 12.5px;
    color: var(--blue-700);
    text-align: right;
    padding-top: 2px;
    font-feature-settings: "tnum";
    line-height:1.2;
    letter-spacing:-.01em;
  }
  .tl-time small{
    display:block;
    font-family: var(--sans);
    font-size: 9.5px;
    color: var(--blue-400);
    margin-top: 2px;
    letter-spacing:.04em;
  }
  .tl-dot{
    position:absolute;
    left: 62px; top: 10px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--cream);
    border: 1.5px solid var(--blue-500);
    box-shadow: 0 0 0 3px var(--paper);
    z-index: 2;
  }
  .tl-item.major .tl-dot{
    background: var(--blue-900);
    border-color: var(--blue-900);
    width: 11px; height:11px;
    left: 61px;
  }
  .tl-content{
    background: rgba(255,255,255,.5);
    border: 1px solid rgba(90,125,163,.16);
    border-radius: 10px;
    padding: 10px 12px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    min-width:0;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .tl-item.major .tl-content{
    background: rgba(255,255,255,.78);
    border-color: rgba(90,125,163,.28);
    box-shadow: var(--shadow);
  }
  .tl-text{
    font-size: 13px; line-height: 1.5;
    color: var(--ink);
  }
  .tl-text strong{ color: var(--blue-900); font-weight:600;}
  .tl-note{
    font-size: 11.5px; color: var(--ink-soft);
    line-height: 1.45;
    margin-top: 4px;
  }
  .tl-addr{
    margin-top: 8px;
    display:inline-flex; align-items:center; gap:6px;
    background: var(--cream);
    border: 1px dashed rgba(90,125,163,.4);
    color: var(--blue-700);
    font-size: 11px; line-height:1.35;
    padding: 6px 9px;
    border-radius: 7px;
    cursor: pointer;
    max-width:100%;
    transition: background .15s, border-color .15s;
    font-family: var(--sans);
  }
  .tl-addr:active{ background: var(--blue-100);}
  .tl-addr.copied{
    background: var(--blue-900); color: var(--cream);
    border-color: var(--blue-900);
  }
  .tl-addr svg{ width:11px; height:11px; flex-shrink:0;}
  .tl-addr .addr-text{
    overflow:hidden; text-overflow: ellipsis;
    white-space: nowrap;
    flex:1; min-width:0;
  }

  /* FOOTER ~1/5 */
  .day-footer{
    flex: 0 0 auto;
    padding: 12px 18px max(env(safe-area-inset-bottom), 14px);
    background: linear-gradient(180deg, transparent 0%, var(--cream-2) 30%, var(--cream-2) 100%);
    border-top: 1px solid rgba(90,125,163,.18);
    display:flex; gap: 10px;
  }
  .foot-btn{
    flex:1;
    background: var(--cream);
    border: 1px solid rgba(27,42,68,.15);
    border-radius: 12px;
    padding: 11px 10px;
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    transition: transform .12s, background .15s;
    font-family: var(--sans);
  }
  .foot-btn:active{ transform: scale(.97); background: var(--blue-100);}
  .foot-btn .ico{
    width:20px; height:20px; color: var(--blue-700);
  }
  .foot-btn .lbl{
    font-size: 11px; color: var(--blue-900); font-weight: 600;
    letter-spacing:.04em;
  }
  .foot-btn .sub{
    font-size: 9.5px; color: var(--ink-soft); letter-spacing:.04em;
  }

  /* ============ MODAL (Stories / Vocab / Stay / Eat) ============ */
  .modal-bg{
    position:absolute; inset:0;
    background: rgba(27,42,68,.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 50;
    display:flex; align-items: flex-end;
    animation: fade-in .2s ease;
  }
  @keyframes fade-in{ from{opacity:0;} to{opacity:1;} }
  @keyframes slide-up{ from{transform:translateY(8%); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .modal{
    width:100%;
    max-height: 86%;
    background: var(--paper);
    border-radius: 18px 18px 0 0;
    padding: 14px 0 max(env(safe-area-inset-bottom), 16px);
    box-shadow: 0 -20px 60px rgba(27,42,68,.25);
    display:flex; flex-direction:column;
    animation: slide-up .25s cubic-bezier(.2,.7,.2,1);
    overflow:hidden;
  }
  .modal-handle{
    width: 36px; height: 4px;
    background: rgba(27,42,68,.2);
    border-radius: 99px;
    margin: 0 auto 10px;
    flex-shrink:0;
  }
  .modal-head{
    padding: 4px 20px 12px;
    border-bottom: 1px solid rgba(90,125,163,.18);
    display:flex; align-items: flex-start; justify-content: space-between;
    flex-shrink:0;
  }
  .modal-title-wrap{flex:1; padding-right: 14px;}
  .modal-kicker{
    font-size: 10px; letter-spacing:.2em; text-transform:uppercase;
    color: var(--blue-500); font-weight:600; margin-bottom: 4px;
  }
  .modal-title{
    font-family: var(--serif);
    font-size: 19px; font-weight: 400;
    color: var(--blue-900);
    line-height: 1.15;
    margin:0;
    letter-spacing:-.01em;
  }
  .modal-title em{ font-style:italic; color: var(--blue-700);}
  .modal-close{
    background: rgba(90,125,163,.15);
    border:none;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor:pointer;
    color: var(--blue-900);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .modal-close:active{ background: rgba(90,125,163,.3);}
  .modal-body{
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px 8px;
    font-size: 13.5px; line-height: 1.62;
    color: var(--ink);
    scrollbar-width: none;
  }
  .modal-body::-webkit-scrollbar{display:none;}
  .modal-body h3{
    font-family: var(--serif);
    font-size: 15.5px;
    color: var(--blue-900);
    margin: 18px 0 6px;
    font-weight: 500;
    letter-spacing:-.005em;
  }
  .modal-body h3:first-child{ margin-top: 0;}
  .modal-body p{
    margin: 0 0 10px;
  }
  .modal-body p.lede{
    font-family: var(--serif);
    font-style: italic;
    color: var(--blue-700);
    font-size: 14.5px;
    line-height: 1.55;
    padding: 0 0 4px;
    border-bottom: 1px solid rgba(90,125,163,.18);
    margin-bottom: 14px;
  }
  .modal-body strong{ color: var(--blue-900); font-weight: 600;}
  .modal-body em.hl{
    font-style: normal;
    background: linear-gradient(180deg, transparent 60%, rgba(199,212,226,.7) 60%);
    padding: 0 2px;
  }
  .modal-body ul{
    padding-left: 18px;
    margin: 4px 0 12px;
  }
  .modal-body li{
    margin: 4px 0;
    line-height: 1.55;
  }

  /* vocab list */
  .vocab-list{
    display:flex; flex-direction:column; gap: 8px;
  }
  .vocab-item{
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(90,125,163,.16);
    border-radius: 10px;
    padding: 9px 12px;
    display:flex; align-items: flex-start; justify-content: space-between;
    gap: 12px;
  }
  .vocab-word{
    font-family: var(--serif);
    font-size: 15px;
    color: var(--blue-900);
    font-weight: 500;
    letter-spacing:-.005em;
  }
  .vocab-word small{
    font-family: var(--sans);
    font-size: 10px;
    color: var(--blue-500);
    margin-left: 6px;
    font-weight: 500;
    letter-spacing:.04em;
    text-transform: uppercase;
  }
  .vocab-meaning{
    font-size: 12.5px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.4;
    flex-shrink:0;
    max-width: 55%;
  }

  /* tips */
  .tip{
    background: rgba(199,212,226,.35);
    border-left: 2px solid var(--blue-500);
    padding: 9px 12px;
    border-radius: 6px;
    margin: 8px 0;
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.55;
  }
  .tip strong{ color: var(--blue-900);}

  /* stay / eat cards */
  .place-card{
    background: rgba(255,255,255,.6);
    border: 1px solid rgba(90,125,163,.2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .place-card.featured{
    background: var(--blue-900);
    color: var(--cream);
    border-color: var(--blue-900);
  }
  .place-card.featured .pc-name{ color: var(--cream);}
  .place-card.featured .pc-note{ color: var(--blue-200);}
  .place-card.featured .pc-addr{
    background: rgba(244,236,219,.12);
    color: var(--cream);
    border-color: rgba(244,236,219,.3);
  }
  .pc-row{
    display:flex; align-items: baseline; justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }
  .pc-name{
    font-family: var(--serif);
    font-size: 15.5px; font-weight: 500;
    color: var(--blue-900);
    line-height: 1.2;
    letter-spacing:-.005em;
  }
  .pc-tag{
    font-size: 9.5px; letter-spacing:.16em; text-transform:uppercase;
    color: var(--blue-500); font-weight:600;
    white-space:nowrap;
  }
  .place-card.featured .pc-tag{ color: var(--cream); opacity:.7;}
  .pc-meta{
    font-size: 11.5px;
    color: var(--blue-500);
    margin-bottom: 6px;
    letter-spacing:.02em;
  }
  .place-card.featured .pc-meta{ color: var(--blue-200);}
  .pc-note{
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .pc-addr{
    display:inline-flex; align-items:center; gap:6px;
    background: var(--cream);
    border: 1px dashed rgba(90,125,163,.4);
    color: var(--blue-700);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    max-width: 100%;
  }
  .pc-addr.copied{ background: var(--blue-700); color: var(--cream); border-color: var(--blue-700);}
  .pc-addr svg{ width:11px; height:11px; flex-shrink:0;}
  .pc-addr .at{
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* Toast */
  .toast{
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--blue-900);
    color: var(--cream);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 99px;
    opacity: 0;
    pointer-events:none;
    transition: opacity .2s, transform .2s;
    z-index: 100;
    box-shadow: var(--shadow-strong);
    letter-spacing:.04em;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0);}

  /* tiny ornament */
  .corner-mark{
    position: absolute;
    top: 16px; right: 18px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 11px;
    color: rgba(90,125,163,.5);
    letter-spacing: .04em;
  }

  /* hint at home */
  .home-hint{
    font-size: 10.5px;
    color: var(--blue-500);
    text-align:center;
    padding: 10px 0 4px;
    letter-spacing:.04em;
  }

  /* legend label inside timeline (when far from now-line) */
  .tl-legend{
    margin: 0 18px 8px;
    font-size: 10px; letter-spacing:.18em; text-transform:uppercase;
    color: var(--blue-500); font-weight:500;
    display:flex; align-items:center; gap:8px;
  }
  .tl-legend .dash{
    flex:1; height:0; border-top: 1px dashed rgba(90,125,163,.3);
  }
</style>

        <h3>罗斯基勒 · 丹麦皇家陵墓</h3>
        <p>罗斯基勒 980–1443 是丹麦首都（500 年）。"Roskilde" = "Hroar's spring"（罗阿尔之泉），命名自半神话维京国王 Hroar。</p>

        <h3>Finn 巨人柱 — 巨人造大教堂的故事</h3>
        <p>中世纪传说：圣徒 Lawrence（劳伦提乌斯）想建大教堂，但没钱没人。来了个巨人 Finn 说："我帮你建，但代价是猜我名字——猜不到你的眼睛归我，或者太阳月亮。"</p>
        <p>Lawrence 走在隆德郊外山里，听到巨人的妻子哄孩子：<em class="hl">"Tyst, tyst, son min, i morgon kommer Finn, far din"</em>（嘘嘘小儿子，明天爸爸 Finn 就回来）。Lawrence 记下名字。大教堂落成那天 Lawrence 喊出 "Finn!"，巨人气疯了想推倒整座教堂，但石头落下来反而把他压在 krypta 的柱子上石化了。</p>

      html: `
        <p class="lede">9 世纪斯堪的纳维亚没有书面文学，所有古老知识靠口传 + 卢恩石。这一天的两块地方——Rök 石和 Gamla Uppsala 王墓——把整个北欧异教世界的精神浓缩在一个上午。</p>

        <h3>Rökstenen · 世界最长卢恩石</h3>
        <p>约 800 AD 刻，760 个符文分布五面（前、后、左、右、顶）。立在 Östergötland 的 Rök 村教堂旁，<strong>从来没移动过</strong>。是父亲 Varinn 为亡子 Vämod 立的石头。开头：<em class="hl">"Aft Vamod standa runaR þaR."</em>（这些符文为 Vamod 而立。）</p>
        <p>但接下来 760 个符文不是悼词——是密码。混用三种符文体系（older futhark、younger futhark、转码字母）、五种密语技术。整个 11 世纪以前没人破解，现代符文学家也吵了 100 年。</p>
        <p><strong>最新解读（Holmberg 2020）</strong>：整篇讲的是 <em class="hl">气候灾难和诸神黄昏 Ragnarök</em>——536 AD"无夏年"导致斯堪的纳维亚饥荒人口减半。维京时代刚开始时（300 年后），这场记忆还在民间流传。铭文通过谜语暗示末日严冬 Fimbulwinter。全文是 9 段谜语，每段问一个问题："谁征服了 12 战场？""谁是 9 个孩子的父亲？"——<strong>可能是父亲考儿子学问，悼念没机会让他长大学这些。所以这块石头既是父爱、也是气候创伤的代际记忆。</strong></p>

        <h3>Gamla Uppsala · 北欧异教的最后堡垒</h3>
        <p>5–11 世纪是斯堪的纳维亚的耶路撒冷——所有维京国王、酋长、自由民每 9 年聚集到这献祭。11 世纪基督教化后教堂建在原异教神庙位置上（对脚踩异教的标准操作）。</p>
        <p><strong>三座王墓土丘</strong>：5–6 世纪建。传说埋着 Aun、Egil、Adils 三位国王（Aun 贪生怕死，传说献祭 9 个儿子换长寿，最后变婴儿要被乳娘喂奶才死）。但考古碳测年都比传说的国王早一两个世纪——所以真正埋的是更早期王朝，传说后来被附会。北欧民间传说改造版：埋着 <strong>奥丁 Oden、托尔 Tor、弗雷 Frej</strong>——主神三位一体。</p>

        <h3>血腥祭典 Blot（亚当 c.1075 记载）</h3>
        <p>每 9 年春分日举行大祭。所有维京自由民必须出席，基督徒也要——基督徒不去要罚金。献祭 9 种雄性动物，每种 9 只——马、狗、公鸡为主，<em class="hl">包括 9 个男人</em>。尸体挂在神庙旁的圣林 hörgr 树上腐烂——亚当记载"那景象惨不忍睹"。</p>

        <h3>Trundholm Solvognen 太阳战车（c. 1400 BC）</h3>
        <p>1902 年农夫犁地翻出来，丹麦最珍贵青铜时代器物。一匹马拉一个圆盘——<strong>圆盘一面镀金，另一面不镀</strong>。金面代表白天太阳，暗面代表夜里太阳穿过冥界。</p>

        <p>丑闻促成了浪漫主义诗人 Adam Oehlenschläger 1802 写的诗《Guldhornene》——<em class="hl">这首诗启动了丹麦黄金时代文学</em>。</p>

        <h3>阿美琳堡 + 腓特烈教堂</h3>
        <p>阿美琳堡 1750–60 建——4 座一模一样宫殿围一个广场，巴洛克对称的极致。1794 Christiansborg 烧毁后丹麦王室紧急买下这 4 栋私人宫殿做新王宫，一直用到今天。</p>
        <p>腓特烈教堂 1749 开建——仿照罗马 St. Peter 圣彼得大教堂的圆顶。<em class="hl">但 1770 因经费用尽停工——只建到圆顶下方一半。停了 124 年</em>。1894 私人富商 Carl Frederik Tietgen 出钱建完，但用便宜的丹麦石灰岩代替挪威大理石。圆顶 31 米直径，欧洲第三大。</p>

        <h3>Kastellet · 文艺复兴军事工程顶峰</h3>
        <p>1626 Christian IV 建，1664 Frederik III 完工——<strong>五角星形要塞，欧洲保存最完整的星堡</strong>。设计哲学：星形角让防御方可以从相邻棱角侧射火力杀进入凹角的攻方——文艺复兴军事工程学顶峰，实现防御火力的无死角覆盖。</p>

        <p>smørrebrød = 黑麦面包 + 黄油 + 各种海鲜/肉/蛋。早午餐文化在丹麦相当于法国的 brasserie。100+ 种组合，必点：<strong>Stjerneskud "流星"</strong>（鱼+虾+鱼子酱）+ <strong>Dyrlægens natmad "兽医的夜宵"</strong>（黑麦面包+猪肝酱+腌牛肉+洋葱）。</p>

  const u = new URL(location.href);
  const demoDay = u.searchParams.get('demo');
  const demoTime = u.searchParams.get('t'); // HHmm
  if (demoDay !== null){
    const day = TRIP[parseInt(demoDay,10)];
    if (day){
      const [y,m,d] = day.date.split('-').map(Number);
      const hh = demoTime ? parseInt(demoTime.slice(0,2),10) : 14;
      const mm = demoTime ? parseInt(demoTime.slice(2,4),10) : 30;
      return new Date(y, m-1, d, hh, mm);
    }
  }
  return new Date();
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toast.classList.remove('show'), 1400);
}

function copyText(txt, btn){
  // try clipboard API first, fall back to textarea
  const done = () => {
    showToast('已复制 · address copied');
    if (btn){
      btn.classList.add('copied');
      setTimeout(()=>btn.classList.remove('copied'), 900);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>{
      fallbackCopy(txt); done();
    });
  } else {
    fallbackCopy(txt); done();
  }
}
function fallbackCopy(txt){
  const ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- compute NOW line position in timeline ---------- */
function positionNowLine(){
  const day = TRIP[state.dayIdx];
  const now = getEffectiveNow();
  const dayDate = day.date;
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if (todayStr !== dayDate) return; // not today

  const tl = app.querySelector('.timeline');
  if (!tl) return;
  const items = [...tl.querySelectorAll('.tl-item')];
  if (!items.length) return;

  // parse each item's start minute
  function parseStart(s){
    // s like "14:30" or "14:30–15:30" or "12:45–13:00"
    const m = s.match(/^(\d{1,2}):(\d{2})/);
    if (!m) return null;
    return parseInt(m[1],10)*60 + parseInt(m[2],10);
  }
  const minutes = items.map(it => parseStart(it.dataset.time));
  const nowMins = now.getHours()*60 + now.getMinutes();

  // find which interval we're in
  let beforeIdx = -1;
  for (let i=0;i<minutes.length;i++){
    if (minutes[i] != null && minutes[i] <= nowMins) beforeIdx = i;
  }
  if (beforeIdx === -1){
    // before first item — place above first
    const first = items[0];
    const top = first.offsetTop - 6;
    placeLine(top, now);
    return;
  }
  if (beforeIdx === items.length-1){
    // after last item
    const last = items[items.length-1];
    const top = last.offsetTop + last.offsetHeight + 6;
    placeLine(top, now);
    return;
  }
  // interpolate between beforeIdx and beforeIdx+1
  const a = items[beforeIdx];
  const b = items[beforeIdx+1];
  const ma = minutes[beforeIdx];
  const mb = minutes[beforeIdx+1];
  let frac = mb===ma ? 0 : (nowMins - ma) / (mb - ma);
  frac = Math.max(0, Math.min(1, frac));
  const aMid = a.offsetTop + a.offsetHeight/2;
  const bMid = b.offsetTop + b.offsetHeight/2;
  const top = aMid + (bMid - aMid)*frac;
  placeLine(top, now);

  function placeLine(top, n){
    let line = app.querySelector('.now-line');
    if (!line){
      line = document.createElement('div');
      line.className = 'now-line';
      tl.appendChild(line);
    }
    const label = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} · now`;
    line.dataset.label = label;
    line.style.top = top + 'px';
  }
}

            All days

        </div>
        <h2 class="day-title">${day.title.replace(/→/g,'<em>→</em>')}</h2>

  app.querySelectorAll('.tl-addr').forEach(b=>{

  // now-line for today
  requestAnimationFrame(()=>{
    positionNowLine();
    // auto-scroll to roughly the now-line
    if (isToday){

function renderTLItem(it){
  const major = it.major ? 'major' : '';
  const timeParts = it.time.split(/[–\-]/);
  const startTime = timeParts[0].trim();
  const endTime = timeParts[1] ? timeParts[1].trim() : '';
  return `
    <div class="tl-item ${major}" data-time="${esc(startTime)}">
      <div class="tl-time">
        ${esc(startTime)}
        ${endTime ? `<small>→ ${esc(endTime)}</small>` : ''}
      </div>
      <div class="tl-dot"></div>
      <div class="tl-content">
        <div class="tl-text"><strong>${esc(it.label)}</strong></div>
        ${it.note ? `<div class="tl-note">${esc(it.note)}</div>` : ''}
        ${it.address ? `
          <button class="tl-addr" data-addr="${esc(it.address)}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="addr-text">${esc(it.address)}</span>
          </button>` : ''}
      </div>
    </div>
  `;
}

/* ---------- Modal ---------- */
function renderModal(){
  if (!state.modal) return;
  // remove existing
  const existing = app.querySelector('.modal-bg');
  if (existing) existing.remove();

  const day = TRIP[state.dayIdx];
  let content = '';
  let kicker = '';
  let title = '';

  if (state.modal === 'stories'){
    kicker = day.stories.kicker;
    title = day.stories.title;
    content = day.stories.html;
  } else if (state.modal === 'vocab'){
    kicker = `Day ${day.id} · ${day.dateLabel}`;
    title = '<em>Vocab</em> &amp; Tips';
    const tipsHtml = (day.vocab.tips||[]).map(t=>`<div class="tip">${esc(t)}</div>`).join('');
    const wordsHtml = (day.vocab.words||[]).map(v=>`
      <div class="vocab-item">
        <div class="vocab-word">${esc(v.w)} <small>${esc(v.lang)}</small></div>
        <div class="vocab-meaning">${esc(v.meaning)}</div>
      </div>
    `).join('');
    content = `
      <h3>今日小贴士</h3>
      ${tipsHtml}
      <h3>词汇 · Vocabulary</h3>
      <div class="vocab-list">${wordsHtml}</div>
    `;
  } else if (state.modal === 'stay'){
    kicker = `Day ${day.id} · 今晚住哪`;
    title = '<em>Stay</em> tonight';
    const s = day.stay;
    content = `
      <div class="place-card featured">
        <div class="pc-row">
          <div class="pc-name">${esc(s.name)}</div>
          <div class="pc-tag">今晚 · tonight</div>
        </div>
        <div class="pc-meta">${esc(s.meta)}</div>
        <div class="pc-note">${esc(s.note)}</div>
        <button class="pc-addr" data-addr="${esc(s.address)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span class="at">${esc(s.address)}</span>
        </button>
      </div>
    `;
  } else if (state.modal === 'eat'){
    kicker = `Day ${day.id} · 哪里吃饭`;
    title = '<em>Where</em> to eat';
    content = day.eat.map(e => `
      <div class="place-card ${e.featured?'featured':''}">
        <div class="pc-row">
          <div class="pc-name">${esc(e.name)}</div>
          <div class="pc-tag">${esc(e.tag||'')}</div>
        </div>
        <div class="pc-meta">${esc(e.meta||'')}</div>
        <div class="pc-note">${esc(e.note||'')}</div>
        ${e.address ? `<button class="pc-addr" data-addr="${esc(e.address)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span class="at">${esc(e.address)}</span>
        </button>` : ''}
      </div>
    `).join('');
  }

  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <div class="modal-title-wrap">
          <div class="modal-kicker">${esc(kicker)}</div>
          <h2 class="modal-title">${title}</h2>
        </div>
        <button class="modal-close" id="modalClose">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">${content}</div>
    </div>
  `;
  app.appendChild(bg);

  bg.addEventListener('click', ()=>{ state.modal=null; bg.remove(); });
  bg.querySelector('#modalClose').addEventListener('click', ()=>{ state.modal=null; bg.remove(); });
  bg.querySelectorAll('.pc-addr').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      copyText(b.dataset.addr, b);
    });
  });
}

function render(){
  if (state.view==='home') renderHome();
  else renderDay();
}

/* Re-position now-line every minute */
setInterval(()=>{
  if (state.view==='day') positionNowLine();
}, 60000);

/* Boot */
render();
